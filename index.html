<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F0F7FF;min-height:100vh}
#root{min-height:100vh}
/* Section tab bar */
.tab-bar{display:flex;gap:2px;overflow-x:auto;padding:4px 8px;background:#E1EBF5;border-radius:0;margin-bottom:0;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{height:3px}
.tab-bar::-webkit-scrollbar-thumb{background:#0078D4;border-radius:3px}
.tab-bar button{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;border:none;cursor:pointer;font-weight:500;white-space:nowrap;transition:all 0.2s}
.tab-active{background:#0078D4;color:#fff!important;box-shadow:0 2px 6px rgba(0,120,212,0.3)}
.tab-inactive{background:transparent;color:#444}
.tab-inactive:hover{background:rgba(0,120,212,0.1)}
/* Two-panel layout for exam */
.exam-panels{display:flex;gap:0;min-height:calc(100vh - 160px)}
.exam-left{flex:1;padding:16px 20px;border-right:1px solid #D1D9E6;background:#FAFCFF;overflow-y:auto}
.exam-right{width:260px;flex-shrink:0;padding:16px;background:#fff;overflow-y:auto}
@media(max-width:800px){
  .exam-panels{flex-direction:column}
  .exam-left{border-right:none;border-bottom:1px solid #D1D9E6}
  .exam-right{width:100%}
}
/* Question nav grid */
.q-nav{display:flex;flex-wrap:wrap;gap:4px}
.q-nav button{width:34px;height:34px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s}
/* General containers */
.container-narrow{max-width:700px;margin:0 auto;padding:24px 16px}
.container-wide{max-width:1100px;margin:0 auto}
</style>
</head>

function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function generateExam(missed, qPerRound) {
  missed = missed || {};
  // Real exam distribution
  var distribution = {
    "Spell It Right": 6, "Word Analysis": 4, "Inflections & Collocations": 6,
    "Find the Correct Sentence": 4, "General Knowledge": 4, "Words and Meanings": 4,
    "Form the Correct Sentence": 4, "Phonetics": 6, "Reading Comprehension": 4,
    "Crossword": 4, "Word Weaving": 3, "Compound Words and Types": 4,
    "Synonyms and Antonyms": 6, "Idioms and Phrases": 4, "Presenting an Argument": 2
  };
  var sections = [];
  for (var ri = 0; ri < ROUNDS.length; ri++) {
    var round = ROUNDS[ri];
    var meta = RMETA[round];
    var pool = Q.filter(function(q){return q.r === round;});
    if (!pool.length) continue;
    var count = Math.min(distribution[round] || 3, pool.length);
    var weighted = pool.map(function(q){return {q:q, w: missed[q.k] ? 3 : 1};});
    var selected = [];
    var avail = [].concat(weighted);
    for (var i = 0; i < count; i++) {
      var tw = avail.reduce(function(s,x){return s+x.w;},0);
      var r2 = Math.random()*tw, ci = 0;
      for (var j = 0; j < avail.length; j++) { r2 -= avail[j].w; if (r2 <= 0){ci=j;break;} }
      selected.push(avail[ci].q);
      avail.splice(ci, 1);
    }
    // Shuffle options for non-complex questions (skip ones with only 2 options or complex formatting)
    var questions = selected.map(function(q) {
      if (q.o.length <= 2) return {k:q.k, q:q.q, options:q.o, answer:q.a, explain:q.e};
      var idx = shuffle([0,1,2,3].slice(0, q.o.length));
      return {k:q.k, q:q.q, options:idx.map(function(i){return q.o[i];}), answer:idx.indexOf(q.a), explain:q.e};
    });
    sections.push({name:round, icon:meta.icon, teach:meta.teach, questions:questions, marks: count});
  }
  return sections;
}

      e("div",{style:{background:T.hdr,padding:"10px 20px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
        e("span",{style:{fontSize:14,fontWeight:700}},"SPIN MOCK GRADE 2"),
        e("span",{style:{fontSize:14,fontWeight:700,background:"rgba(255,255,255,0.15)",padding:"4px 14px",borderRadius:20}},"⏱ "+fmtTime(timeLeft)),
        e("span",{style:{fontSize:13}},ac+"/"+totQ+" answered")),
      // ── Section tabs (full width, scrollable)
      e("div",{className:"tab-bar"},
        exam.map(function(s,i){
          var st=exam.slice(0,i).reduce(function(a,sec){return a+sec.questions.length;},0);
          var isCur=i===q.si;
          // Show checkmark if all answered in section
          var secEnd=st+s.questions.length;
          var allDone=true;for(var j=st;j<secEnd;j++){if(ans[j]===undefined)allDone=false;}
          var label=s.icon+" "+s.name;
          if(label.length>18)label=s.icon+" "+s.name.split(" ").slice(0,2).join(" ");
          return e("button",{key:i,onClick:function(){setCurQ(st);},className:isCur?"tab-active":"tab-inactive"},
            (allDone?"✅ ":"")+label);})),
      // ── Section sub-header
      e("div",{style:{background:T.priL,padding:"8px 20px",fontSize:13,color:T.hdr,fontWeight:600,borderBottom:"1px solid "+T.bdr}},
        exam[q.si].icon+" "+exam[q.si].name.toUpperCase()+" – ("+exam[q.si].questions.length+"×1 = "+exam[q.si].questions.length+" Marks)"),
      // ── Two-panel body
      e("div",{className:"exam-panels",style:{flex:1}},
        // LEFT PANEL: Question + options
        e("div",{className:"exam-left"},
          // Section teaching hint (collapsible feel)
          e("div",{style:{background:T.warnL,borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#92400E",lineHeight:"1.5"}},"💡 "+exam[q.si].teach),
          // Question card
          e("div",{style:{background:T.card,borderRadius:10,padding:20,border:"1px solid "+T.bdr,marginBottom:14}},
            e("div",{style:{fontSize:13,color:T.hdr,marginBottom:10,fontWeight:700}},"Question No. "+(curQ+1)),
            e("p",{style:{fontSize:15,fontWeight:600,color:T.txt,lineHeight:"1.8",whiteSpace:"pre-line",margin:"0 0 20px"}},q.q),
            // Options with radio buttons
            e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
              q.options.map(function(opt,i){
                var sel=ans[curQ]===i;
                return e("label",{key:i,onClick:function(){pick(curQ,i);},style:{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:8,border:"2px solid "+(sel?T.pri:T.bdr),background:sel?T.priL:"#FAFCFF",cursor:"pointer",transition:"all 0.15s"}},
                  e("span",{style:{width:20,height:20,borderRadius:20,border:"2px solid "+(sel?T.pri:"#aaa"),background:sel?T.pri:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                    sel&&e("span",{style:{width:8,height:8,borderRadius:8,background:"#fff"}})),
                  e("span",{style:{fontSize:14,color:T.txt,lineHeight:"1.5"}},opt));}))),
          // Navigation buttons
          e("div",{style:{display:"flex",gap:10,marginTop:16,paddingBottom:20}},
            curQ>0&&e("button",{onClick:function(){setCurQ(curQ-1);},style:{padding:"11px 24px",borderRadius:8,border:"1px solid "+T.bdr,background:T.card,color:T.txt,cursor:"pointer",fontWeight:600,fontSize:13}},"Previous"),
            curQ<totQ-1?
              e("button",{onClick:function(){setCurQ(curQ+1);},style:{padding:"11px 24px",borderRadius:8,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}},"Save & Next"):
              e("button",{onClick:submitExam,style:{padding:"11px 24px",borderRadius:8,border:"none",background:T.ok,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}},"Submit"),
            e("button",{onClick:function(){if(confirm("Submit exam now?"))submitExam();},style:{marginLeft:"auto",padding:"11px 20px",borderRadius:8,border:"2px solid "+T.err,background:"transparent",color:T.err,cursor:"pointer",fontWeight:600,fontSize:13}},"Submit"))),
        // RIGHT PANEL: Section navigator + status
        e("div",{className:"exam-right"},
          // Status summary
          e("div",{style:{display:"flex",gap:8,marginBottom:14}},
            e("div",{style:{flex:1,textAlign:"center",padding:6,background:T.okL,borderRadius:6}},
              e("div",{style:{fontSize:16,fontWeight:800,color:T.ok}},ac),
              e("div",{style:{fontSize:9,color:T.ok}},"Answered")),
            e("div",{style:{flex:1,textAlign:"center",padding:6,background:T.errL,borderRadius:6}},
              e("div",{style:{fontSize:16,fontWeight:800,color:T.err}},totQ-ac),
              e("div",{style:{fontSize:9,color:T.err}},"Remaining"))),
          // Current section navigator
          e("div",{style:{background:T.hdr,color:"#fff",padding:"8px 10px",borderRadius:"6px 6px 0 0",fontSize:12,fontWeight:600}},exam[q.si].name),
          e("div",{style:{border:"1px solid "+T.bdr,borderTop:"none",borderRadius:"0 0 6px 6px",padding:10,marginBottom:14}},
            e("div",{style:{fontSize:10,color:T.txtL,marginBottom:6}},"Choose a Question"),
            e("div",{className:"q-nav"},
              exam[q.si].questions.map(function(qq,qi){
                var gi=secStart+qi;
                var answered=ans[gi]!==undefined;var isCur=gi===curQ;
                return e("button",{key:qi,onClick:function(){setCurQ(gi);},
                  style:{border:isCur?"2px solid "+T.pri:"1px solid "+T.bdr,
                    background:answered?"#22C55E":isCur?T.priL:T.card,
                    color:answered?"#fff":T.txt}},qi+1);}))),
          // Full exam jump grid
          e("div",{style:{marginTop:8}},
            e("div",{style:{fontSize:10,color:T.txtL,marginBottom:6,fontWeight:600}},"All Questions"),
            e("div",{style:{display:"flex",flexWrap:"wrap",gap:3}},
              allQ.map(function(_,i){
                var answered=ans[i]!==undefined;var isCur=i===curQ;
                return e("button",{key:i,onClick:function(){setCurQ(i);},
                  style:{width:28,height:28,borderRadius:4,fontSize:9,fontWeight:600,border:isCur?"2px solid "+T.pri:"1px solid transparent",
                    background:answered?T.priL:"#F1F5F9",color:answered?T.pri:T.txtL,cursor:"pointer"}},i+1);}))))));
  }

  // ─── RESULTS ──────────────────────────────────────────────────
  if(screen==="results"&&exam){
    var r=getResults(),pct=Math.round(r.correct/r.total*100);
    var emoji=pct>=90?"🏆":pct>=70?"🌟":pct>=50?"💪":"🌱";
    var msg=pct>=90?"Outstanding!":pct>=70?"Great job!":pct>=50?"Good effort!":"Keep practising!";
    return e("div",{style:{minHeight:"100vh",background:T.bg}},
      e("div",{style:{maxWidth:600,margin:"0 auto",padding:"24px 16px"}},
        e("div",{style:{background:"linear-gradient(135deg,"+T.hdr+",#005a9e)",borderRadius:16,padding:24,textAlign:"center",color:"#fff",marginBottom:20}},
          e("div",{style:{fontSize:48}},emoji),e("h1",{style:{margin:"4px 0",fontSize:22,fontWeight:800}},msg),
          e("div",{style:{fontSize:40,fontWeight:800,margin:"4px 0"}},pct+"%"),
          e("p",{style:{margin:0,opacity:0.9,fontSize:14}},r.correct+" / "+r.total+" correct")),
        e("h2",{style:{fontSize:15,fontWeight:700,color:T.txt,margin:"0 0 10px"}},"📊 Section Results"),
        r.sections.map(function(s,i){
          var sp=Math.round(s.correct/s.total*100),perf=s.correct===s.total,sc=perf?T.ok:sp>=50?T.warn:T.err;
          return e("div",{key:i,style:{background:T.card,borderRadius:8,padding:12,marginBottom:5,border:"1px solid "+T.bdr,borderLeft:"4px solid "+sc}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("div",null,e("span",{style:{fontSize:12,fontWeight:600,color:T.txt}},s.icon+" "+s.name),e("span",{style:{fontSize:11,color:T.txtL,marginLeft:6}},s.correct+"/"+s.total)),
              perf?e("span",{style:{fontSize:10,color:T.ok,fontWeight:600}},"⭐"):
                e("button",{onClick:function(){setRetestSec(s);setRetestAns({});setRetestDone(false);setScreen("retest");},style:{padding:"3px 8px",borderRadius:5,border:"none",fontSize:10,background:T.priL,color:T.pri,cursor:"pointer",fontWeight:600}},"Practice")),
            e("div",{style:{height:4,background:"#F1F5F9",borderRadius:99,marginTop:5}},e("div",{style:{height:"100%",background:sc,borderRadius:99,width:sp+"%"}})));}),
        e("h2",{style:{fontSize:15,fontWeight:700,color:T.txt,margin:"18px 0 10px"}},"📝 Review Mistakes"),
        r.sections.filter(function(s){return s.correct<s.total;}).map(function(s,si){
          return e("div",{key:si,style:{marginBottom:14}},
            e("h3",{style:{fontSize:13,fontWeight:700,color:T.hdr,margin:"0 0 5px"}},s.icon+" "+s.name),
            e("div",{style:{background:T.warnL,borderRadius:6,padding:8,marginBottom:6,fontSize:11,color:"#92400E",lineHeight:"1.5"}},"💡 "+s.teach),
            s.questions.filter(function(q){return!q.isCorrect;}).map(function(q,qi){
              return e("div",{key:qi,style:{background:T.card,borderRadius:6,padding:10,marginBottom:4,borderLeft:"3px solid "+T.err,border:"1px solid "+T.errL}},
                e("p",{style:{margin:0,fontSize:11,fontWeight:600,color:T.txt,whiteSpace:"pre-line"}},q.q),
                e("div",{style:{marginTop:3,fontSize:10}},
                  q.userAnswer!==undefined?e("span",{style:{color:T.err,fontWeight:600}},"Your answer: "+q.options[q.userAnswer]):e("span",{style:{color:T.txtL}},"Not answered")),
                e("div",{style:{marginTop:2,fontSize:10,color:T.ok,fontWeight:600}},"✓ Correct: "+q.options[q.answer]),
                e("div",{style:{marginTop:5,padding:6,background:"#F0F7FF",borderRadius:5,fontSize:10,color:"#0369A1",lineHeight:"1.5"}},"📖 "+q.explain));}));}),
        e("div",{style:{display:"flex",gap:8,marginTop:18,marginBottom:30}},
          e("button",{onClick:function(){setScreen("home");},style:{flex:1,padding:12,borderRadius:10,border:"1px solid "+T.bdr,background:T.card,color:T.txt,cursor:"pointer",fontWeight:600,fontSize:13}},"🏠 Home"),
          e("button",{onClick:startExam,style:{flex:1,padding:12,borderRadius:10,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}},"🔄 New Exam"))));
  }

  // ─── RETEST ───────────────────────────────────────────────────
  if(screen==="retest"&&retestSec){
    var wq=retestSec.questions.filter(function(q){return!q.isCorrect;});
    if(!wq.length)return e("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
      e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:48}},"⭐"),e("h2",null,"All correct!"),
        e("button",{onClick:function(){setScreen("results");},style:{padding:"10px 20px",borderRadius:8,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600,marginTop:12}},"Back")));
    return e("div",{style:{minHeight:"100vh",background:T.bg}},
      e("div",{style:{maxWidth:600,margin:"0 auto",padding:"20px 16px"}},
        e("button",{onClick:function(){setScreen("results");},style:{background:"none",border:"none",color:T.txtL,cursor:"pointer",fontSize:13,marginBottom:10}},"← Results"),
        e("div",{style:{background:T.hdr,borderRadius:10,padding:14,color:"#fff",marginBottom:14,textAlign:"center"}},
          e("h2",{style:{margin:0,fontSize:16,fontWeight:700}},"🎯 "+retestSec.icon+" "+retestSec.name)),
        e("div",{style:{background:T.warnL,borderRadius:8,padding:10,marginBottom:14,fontSize:11,color:"#92400E",lineHeight:"1.5"}},"💡 "+retestSec.teach),
        wq.map(function(q,i){
          var ua=retestAns[i],sh=retestDone,ok=sh&&ua===q.answer;
          return e("div",{key:i,style:{background:T.card,borderRadius:10,padding:14,marginBottom:8,border:"1px solid "+(sh?(ok?T.ok:T.errL):T.bdr),borderLeft:sh?"4px solid "+(ok?T.ok:T.err):"4px solid "+T.pri}},
            e("p",{style:{fontSize:12,fontWeight:600,color:T.txt,lineHeight:"1.6",margin:"0 0 10px",whiteSpace:"pre-line"}},q.q),
            e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
              q.options.map(function(opt,oi){
                var sel=ua===oi,cor=oi===q.answer,bg=T.card,bc=T.bdr;
                if(sh&&cor){bg=T.okL;bc=T.ok;}if(sh&&sel&&!cor){bg=T.errL;bc=T.err;}if(!sh&&sel){bg=T.priL;bc=T.pri;}
                return e("label",{key:oi,onClick:function(){if(!retestDone){var n=Object.assign({},retestAns);n[i]=oi;setRetestAns(n);}},style:{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,border:"2px solid "+bc,background:bg,cursor:retestDone?"default":"pointer"}},
                  e("span",{style:{width:16,height:16,borderRadius:16,border:"2px solid "+(sel?T.pri:"#999"),background:sel?T.pri:"transparent",display:"inline-block"}}),
                  e("span",{style:{fontSize:12,color:T.txt}},opt));})),
            sh&&e("div",{style:{marginTop:8,padding:8,background:"#F0F7FF",borderRadius:6,fontSize:11,color:"#0369A1",lineHeight:"1.5"}},"📖 "+q.explain));}),
        !retestDone?
          e("button",{onClick:function(){setRetestDone(true);},style:{width:"100%",padding:12,borderRadius:10,border:"none",marginTop:6,background:T.ok,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}},"✓ Check Answers"):
          e("div",{style:{display:"flex",gap:8,marginTop:10,justifyContent:"center"}},
            e("button",{onClick:function(){setRetestAns({});setRetestDone(false);},style:{padding:"8px 14px",borderRadius:8,border:"1px solid "+T.bdr,background:T.card,color:T.txt,cursor:"pointer",fontWeight:600,fontSize:12}},"🔄 Retry"),
            e("button",{onClick:function(){setScreen("results");},style:{padding:"8px 14px",borderRadius:8,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:12}},"📊 Results"))));
  }
  return null;
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
