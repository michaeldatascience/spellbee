// ─── EXAM GENERATOR ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateExam(missedKeys = {}, perRound = 3) {
  const sections = [];
  for (const round of ROUNDS) {
    const meta = RMETA[round];
    const pool = Q.filter(q => q.r === round);
    if (!pool.length) continue;
    const weighted = pool.map(q => ({ ...q, weight: missedKeys[q.k] ? 3 : 1 }));
    const selected = [];
    const avail = [...weighted];
    const count = Math.min(perRound, avail.length);
    for (let i = 0; i < count; i++) {
      const tw = avail.reduce((s, q) => s + q.weight, 0);
      let r = Math.random() * tw;
      let ci = 0;
      for (let j = 0; j < avail.length; j++) { r -= avail[j].weight; if (r <= 0) { ci = j; break; } }
      selected.push(avail[ci]);
      avail.splice(ci, 1);
    }
    const questions = selected.map(q => {
      const idx = shuffle([0,1,2,3]);
      return { k: q.k, q: q.q, options: idx.map(i => q.o[i]), answer: idx.indexOf(q.a), explain: q.e };
    });
    sections.push({ name: round, icon: meta.icon, teach: meta.teach, questions });
  }
  return sections;
}



// ─── STORAGE (localStorage) ─────────────────────────────────────
const STORE_KEY = "spellbee-data";
function loadData() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : { attempts: [], answerLog: {} }; }
  catch { return { attempts: [], answerLog: {} }; }
}
function saveData(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) { console.error("Save failed:", e); }
}

// ─── THEME ──────────────────────────────────────────────────────
const T = {
  bg:"#FFFBF0",card:"#FFF",pri:"#6C63FF",priL:"#E8E6FF",ok:"#22C55E",okL:"#DCFCE7",
  err:"#EF4444",errL:"#FEE2E2",warn:"#F59E0B",warnL:"#FEF3C7",txt:"#1E293B",
  txtL:"#64748B",bdr:"#E2E8F0",ac1:"#EC4899",ac3:"#8B5CF6",
};

// ─── APP ────────────────────────────────────────────────────────
const e = React.createElement;
const { useState, useCallback, useMemo, useEffect, useRef } = React;

function App() {
  const [screen, setScreen] = useState("home");
  const [exam, setExam] = useState(null);
  const [curQ, setCurQ] = useState(0);
  const [ans, setAns] = useState({});
  const [data, setData] = useState(loadData());
  const [retestSec, setRetestSec] = useState(null);
  const [retestAns, setRetestAns] = useState({});
  const [retestDone, setRetestDone] = useState(false);
  const startRef = useRef(null);
  const [dashPin, setDashPin] = useState("");
  const [dashAuth, setDashAuth] = useState(false);

  const allQ = useMemo(function() {
    if (!exam) return [];
    return exam.reduce(function(acc, s, si) {
      return acc.concat(s.questions.map(function(q) { return Object.assign({}, q, {si:si, sn:s.name, sic:s.icon}); }));
    }, []);
  }, [exam]);
  const totQ = allQ.length;

  function startExam() {
    var missed = {};
    Object.keys(data.answerLog).forEach(function(k) { var v = data.answerLog[k]; if (v.wrong > 0) missed[k] = v.wrong; });
    var sections = generateExam(missed, 3);
    setExam(sections); setCurQ(0); setAns({}); startRef.current = Date.now(); setScreen("exam");
  }

  function pick(qi, oi) { setAns(function(p) { var n = Object.assign({}, p); n[qi] = oi; return n; }); }

  function submitExam() {
    var dur = Math.round((Date.now() - (startRef.current || Date.now())) / 1000);
    var correct = 0;
    var newLog = Object.assign({}, data.answerLog);
    allQ.forEach(function(q, i) {
      var ua = ans[i]; var ic = ua === q.answer;
      if (ic) correct++;
      if (!newLog[q.k]) newLog[q.k] = { seen: 0, correct: 0, wrong: 0, round: q.sn };
      newLog[q.k].seen++;
      if (ic) newLog[q.k].correct++; else newLog[q.k].wrong++;
    });
    var pct = Math.round((correct / totQ) * 100);
    var attempt = { date: new Date().toISOString(), score: correct, total: totQ, pct: pct, duration: dur };
    var newData = { attempts: data.attempts.concat([attempt]), answerLog: newLog };
    setData(newData);
    saveData(newData);
    setScreen("results");
  }

  function getResults() {
    if (!exam) return { total: 0, correct: 0, sections: [] };
    var correct = 0;
    var sr = exam.map(function(sec, si) {
      var sc = 0;
      var qd = sec.questions.map(function(q, qi) {
        var gi = exam.slice(0, si).reduce(function(a, s) { return a + s.questions.length; }, 0) + qi;
        var ua = ans[gi], ic = ua === q.answer;
        if (ic) { sc++; correct++; }
        return Object.assign({}, q, { userAnswer: ua, isCorrect: ic });
      });
      return Object.assign({}, sec, { correct: sc, total: sec.questions.length, questions: qd });
    });
    return { total: totQ, correct: correct, sections: sr };
  }

  // Helper to create styled elements
  function d(tag, style, props, children) {
    var p = Object.assign({style: style}, props || {});
    return e.apply(null, [tag, p].concat(children || []));
  }

  // ─── DASHBOARD ────────────────────────────────────────────────
  if (screen === "dashboard") {
    if (!dashAuth) {
      return e("div", {style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
        e("div", {style:{background:T.card,borderRadius:20,padding:32,maxWidth:340,width:"100%",textAlign:"center",border:"1px solid "+T.bdr}},
          e("div", {style:{fontSize:40,marginBottom:8}}, "🔒"),
          e("h2", {style:{margin:"0 0 4px",fontSize:20,fontWeight:700,color:T.txt}}, "Parent Dashboard"),
          e("p", {style:{margin:"0 0 16px",fontSize:13,color:T.txtL}}, "Enter PIN"),
          e("input", {type:"password",value:dashPin,onChange:function(ev){setDashPin(ev.target.value);},
            onKeyDown:function(ev){if(ev.key==="Enter"&&dashPin==="1234")setDashAuth(true);},
            placeholder:"PIN",style:{width:"100%",padding:12,borderRadius:12,border:"2px solid "+T.bdr,fontSize:16,textAlign:"center",outline:"none",boxSizing:"border-box",marginBottom:12}}),
          e("button", {onClick:function(){if(dashPin==="1234")setDashAuth(true);else alert("Wrong PIN");},
            style:{width:"100%",padding:12,borderRadius:12,border:"none",background:T.pri,color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}, "View"),
          e("p", {style:{margin:"12px 0 0",fontSize:11,color:T.txtL}}, "PIN: 1234"),
          e("button", {onClick:function(){setScreen("home");},style:{marginTop:12,background:"none",border:"none",color:T.pri,cursor:"pointer",fontSize:13}}, "← Back")
        )
      );
    }

    var atts = data.attempts;
    var avg = atts.length ? Math.round(atts.reduce(function(s,a){return s+a.pct;},0)/atts.length) : 0;
    var best = atts.length ? Math.max.apply(null, atts.map(function(a){return a.pct;})) : 0;
    var roundStats = {};
    Object.keys(data.answerLog).forEach(function(k) {
      var v = data.answerLog[k];
      if (!roundStats[v.round]) roundStats[v.round] = {total:0,correct:0};
      roundStats[v.round].total += v.seen;
      roundStats[v.round].correct += v.correct;
    });
    var roundArr = Object.keys(roundStats).map(function(name) {
      var s = roundStats[name];
      return {name:name, pct:Math.round(s.correct/s.total*100)};
    }).sort(function(a,b){return a.pct-b.pct;});

    return e("div", {style:{minHeight:"100vh",background:T.bg}},
      e("div", {style:{maxWidth:650,margin:"0 auto",padding:"24px 16px"}},
        e("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
          e("h1", {style:{margin:0,fontSize:22,fontWeight:800,color:T.txt}}, "📊 Dashboard"),
          e("button", {onClick:function(){setDashAuth(false);setDashPin("");setScreen("home");},
            style:{padding:"8px 16px",borderRadius:10,background:T.priL,color:T.pri,fontWeight:600,fontSize:13,border:"none",cursor:"pointer"}}, "← Home")
        ),
        // Stats cards
        e("div", {style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}},
          [{l:"Attempts",v:atts.length,c:T.pri},{l:"Average",v:avg+"%",c:T.warn},{l:"Best",v:best+"%",c:T.ok}].map(function(s,i){
            return e("div", {key:i,style:{background:T.card,borderRadius:12,padding:16,border:"1px solid "+T.bdr,textAlign:"center"}},
              e("div", {style:{fontSize:28,fontWeight:800,color:s.c}}, s.v),
              e("div", {style:{fontSize:11,color:T.txtL,marginTop:4}}, s.l)
            );
          })
        ),
        // Score history bars
        atts.length > 0 && e("div", {style:{background:T.card,borderRadius:14,padding:16,border:"1px solid "+T.bdr,marginBottom:20}},
          e("h2", {style:{margin:"0 0 12px",fontSize:15,fontWeight:700,color:T.txt}}, "📈 Score History"),
          e("div", {style:{display:"flex",alignItems:"flex-end",gap:4,height:120}},
            atts.slice(-20).map(function(a,i){
              return e("div", {key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
                e("span", {style:{fontSize:9,color:T.txtL,fontWeight:600}}, a.pct+"%"),
                e("div", {style:{width:"100%",background:a.pct>=70?T.ok:a.pct>=50?T.warn:T.err,borderRadius:"4px 4px 0 0",height:Math.max(a.pct,5)+"%",minHeight:4}}),
                e("span", {style:{fontSize:8,color:T.txtL}}, "#"+(atts.indexOf(a)+1))
              );
            })
          )
        ),
        // Round accuracy
        roundArr.length > 0 && e("div", {style:{background:T.card,borderRadius:14,padding:16,border:"1px solid "+T.bdr,marginBottom:20}},
          e("h2", {style:{margin:"0 0 12px",fontSize:15,fontWeight:700,color:T.txt}}, "🎯 Accuracy by Round"),
          roundArr.map(function(r,i){
            return e("div", {key:i,style:{marginBottom:8}},
              e("div", {style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}},
                e("span", {style:{color:T.txt}}, r.name.length>25?r.name.slice(0,23)+"..":r.name),
                e("span", {style:{fontWeight:700,color:r.pct>=70?T.ok:r.pct>=50?T.warn:T.err}}, r.pct+"%")
              ),
              e("div", {style:{height:8,background:"#F1F5F9",borderRadius:99}},
                e("div", {style:{height:"100%",borderRadius:99,width:r.pct+"%",background:r.pct>=70?T.ok:r.pct>=50?T.warn:T.err}})
              )
            );
          })
        ),
        // All attempts list
        atts.length > 0 && e("div", {style:{background:T.card,borderRadius:14,padding:16,border:"1px solid "+T.bdr,marginBottom:20}},
          e("h2", {style:{margin:"0 0 12px",fontSize:15,fontWeight:700,color:T.txt}}, "📋 All Attempts"),
          atts.slice().reverse().map(function(a,i){
            return e("div", {key:i,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+T.bdr,fontSize:13}},
              e("span", {style:{color:T.txtL}}, new Date(a.date).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})),
              e("span", {style:{fontWeight:700,color:a.pct>=70?T.ok:a.pct>=50?T.warn:T.err}}, a.score+"/"+a.total+" ("+a.pct+"%)")
            );
          })
        ),
        atts.length === 0 && e("div", {style:{textAlign:"center",padding:40,color:T.txtL}},
          e("div", {style:{fontSize:48}}, "📝"), e("p", null, "No attempts yet!")
        ),
        e("button", {onClick:function(){if(confirm("Erase ALL progress?")){saveData({attempts:[],answerLog:{}});setData({attempts:[],answerLog:{}});}},
          style:{display:"block",margin:"20px auto",padding:"8px 16px",borderRadius:8,border:"1px solid "+T.err,background:"transparent",color:T.err,fontSize:12,cursor:"pointer"}}, "🗑️ Reset All Data")
      )
    );
  }

  // ─── HOME ─────────────────────────────────────────────────────
  if (screen === "home") {
    return e("div", {style:{minHeight:"100vh",background:T.bg}},
      e("div", {style:{maxWidth:600,margin:"0 auto",padding:"32px 16px"}},
        e("div", {style:{textAlign:"center",marginBottom:28}},
          e("div", {style:{fontSize:48,marginBottom:4}}, "🐝"),
          e("h1", {style:{fontSize:26,fontWeight:800,color:T.txt,margin:0}}, "SpellBee International"),
          e("p", {style:{color:T.pri,fontWeight:600,fontSize:14,margin:"4px 0"}}, "Level 4 (International) • Grade 2"),
          e("p", {style:{color:T.txtL,fontSize:12}}, "15 SLEP Rounds • Fresh questions every attempt!")
        ),
        e("div", {onClick:startExam,style:{background:"linear-gradient(135deg,"+T.pri+","+T.ac3+")",borderRadius:16,padding:24,textAlign:"center",cursor:"pointer",color:"#fff",marginBottom:16,boxShadow:"0 4px 16px rgba(108,99,255,0.3)"}},
          e("div", {style:{fontSize:32,marginBottom:8}}, "▶"),
          e("h2", {style:{margin:0,fontSize:20,fontWeight:700}}, "Start New Exam"),
          e("p", {style:{margin:"8px 0 0",opacity:0.9,fontSize:13}}, "45 questions • 15 rounds • Adapts to weak areas")
        ),
        data.attempts.length > 0 && e("div", {style:{background:T.card,borderRadius:12,padding:16,border:"1px solid "+T.bdr,marginBottom:16}},
          e("h3", {style:{margin:"0 0 8px",fontSize:14,fontWeight:700,color:T.txt}}, "📊 Recent ("+data.attempts.length+" total)"),
          data.attempts.slice().reverse().slice(0,5).map(function(a,i){
            return e("div", {key:i,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:i<4?"1px solid "+T.bdr:"none",fontSize:13}},
              e("span", {style:{color:T.txtL}}, new Date(a.date).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})),
              e("span", {style:{fontWeight:700,color:a.pct>=70?T.ok:a.pct>=50?T.warn:T.err}}, a.score+"/"+a.total+" ("+a.pct+"%)")
            );
          })
        ),
        e("button", {onClick:function(){setScreen("dashboard");},style:{display:"block",width:"100%",textAlign:"center",padding:12,background:T.card,borderRadius:12,border:"1px solid "+T.bdr,color:T.pri,fontWeight:600,fontSize:14,cursor:"pointer",marginBottom:16}}, "📊 Parent Dashboard"),
        e("div", {style:{padding:12,background:T.warnL,borderRadius:12,fontSize:12,color:"#92400E",lineHeight:"1.6",textAlign:"center"}},
          "💡 Each exam has fresh questions from a pool of "+Q.length+". Wrong answers appear more often next time!"
        )
      )
    );
  }

  // ─── EXAM ─────────────────────────────────────────────────────
  if (screen === "exam" && exam) {
    var q = allQ[curQ]; var ac = Object.keys(ans).length;
    return e("div", {style:{minHeight:"100vh",background:T.bg}},
      e("div", {style:{maxWidth:600,margin:"0 auto",padding:16}},
        // Header
        e("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          e("button", {onClick:function(){if(confirm("Leave?"))setScreen("home");},style:{background:"none",border:"none",color:T.txtL,cursor:"pointer",fontSize:14}}, "← Back"),
          e("span", {style:{fontSize:14,fontWeight:600,color:T.txt}}, "Practice Exam"),
          e("span", {style:{padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:600,color:T.pri,background:T.priL}}, ac+"/"+totQ)
        ),
        // Progress bar
        e("div", {style:{marginBottom:16}},
          e("div", {style:{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13,color:T.txtL}},
            e("span", null, q.sic+" "+q.sn), e("span", null, "Q"+(curQ+1)+"/"+totQ)
          ),
          e("div", {style:{height:8,background:T.bdr,borderRadius:99}},
            e("div", {style:{height:"100%",background:"linear-gradient(90deg,"+T.pri+","+T.ac3+")",borderRadius:99,width:((curQ+1)/totQ*100)+"%",transition:"width 0.4s"}})
          )
        ),
        // Section tabs
        e("div", {style:{display:"flex",gap:3,marginBottom:12,overflowX:"auto",paddingBottom:4}},
          exam.map(function(s,i){
            var st = exam.slice(0,i).reduce(function(a,sec){return a+sec.questions.length;},0);
            return e("button", {key:i,onClick:function(){setCurQ(st);},
              style:{flexShrink:0,padding:"4px 8px",borderRadius:8,fontSize:11,border:"none",cursor:"pointer",
                background:i===q.si?T.pri:T.card,color:i===q.si?"#fff":T.txtL,fontWeight:i===q.si?600:400}}, s.icon);
          })
        ),
        // Question card
        e("div", {style:{background:T.card,borderRadius:16,padding:20,border:"1px solid "+T.bdr,marginBottom:12}},
          e("div", {style:{display:"flex",justifyContent:"space-between",marginBottom:14}},
            e("span", {style:{padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:600,color:T.ac3,background:"#F3E8FF"}}, "Q"+(curQ+1)),
            e("span", {style:{fontSize:11,color:T.txtL}}, q.sic+" "+q.sn)
          ),
          e("p", {style:{fontSize:15,fontWeight:600,color:T.txt,lineHeight:"1.6",margin:"0 0 16px",whiteSpace:"pre-line"}}, q.q),
          e("div", {style:{display:"flex",flexDirection:"column",gap:8}},
            q.options.map(function(opt,i){
              var sel = ans[curQ]===i;
              return e("button", {key:i,onClick:function(){pick(curQ,i);},
                style:{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,
                  border:"2px solid "+(sel?T.pri:T.bdr),background:sel?T.priL:T.card,cursor:"pointer",textAlign:"left"}},
                e("span", {style:{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:13,fontWeight:700,background:sel?T.pri:"#F1F5F9",color:sel?"#fff":T.txtL}}, "ABCD"[i]),
                e("span", {style:{fontSize:14,color:T.txt,fontWeight:sel?600:400}}, opt)
              );
            })
          )
        ),
        // Nav buttons
        e("div", {style:{display:"flex",gap:8,marginBottom:12}},
          e("button", {onClick:function(){setCurQ(Math.max(0,curQ-1));},disabled:curQ===0,
            style:{flex:1,padding:12,borderRadius:12,border:"1px solid "+T.bdr,background:T.card,
              color:curQ===0?T.bdr:T.txt,cursor:curQ===0?"default":"pointer",fontWeight:600,fontSize:14}}, "← Prev"),
          curQ<totQ-1 ?
            e("button", {onClick:function(){setCurQ(curQ+1);},
              style:{flex:1,padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,"+T.pri+","+T.ac3+")",
                color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}, "Next →") :
            e("button", {onClick:submitExam,
              style:{flex:1,padding:12,borderRadius:12,border:"none",
                background:ac<totQ?"linear-gradient(135deg,"+T.warn+",#D97706)":"linear-gradient(135deg,"+T.ok+",#16A34A)",
                color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}},
              ac<totQ ? "Submit ("+(totQ-ac)+" left)" : "✓ Submit")
        ),
        // Jump grid
        e("div", {style:{background:T.card,borderRadius:10,padding:10,border:"1px solid "+T.bdr}},
          e("p", {style:{fontSize:11,color:T.txtL,margin:"0 0 6px",fontWeight:600}}, "Jump:"),
          e("div", {style:{display:"flex",flexWrap:"wrap",gap:3}},
            allQ.map(function(_,i){
              return e("button", {key:i,onClick:function(){setCurQ(i);},
                style:{width:28,height:28,borderRadius:6,fontSize:10,fontWeight:600,
                  border:i===curQ?"2px solid "+T.pri:"1px solid transparent",
                  background:ans[i]!==undefined?T.priL:"#F1F5F9",color:ans[i]!==undefined?T.pri:T.txtL,cursor:"pointer"}}, i+1);
            })
          )
        )
      )
    );
  }

  // ─── RESULTS ──────────────────────────────────────────────────
  if (screen === "results" && exam) {
    var r = getResults();
    var pct = Math.round((r.correct/r.total)*100);
    var emoji = pct>=90?"🏆":pct>=70?"🌟":pct>=50?"💪":"🌱";
    var msg = pct>=90?"Outstanding!":pct>=70?"Great job!":pct>=50?"Good effort!":"Keep practising!";

    return e("div", {style:{minHeight:"100vh",background:T.bg}},
      e("div", {style:{maxWidth:600,margin:"0 auto",padding:"24px 16px"}},
        // Score card
        e("div", {style:{background:"linear-gradient(135deg,"+T.pri+","+T.ac3+")",borderRadius:20,padding:28,textAlign:"center",color:"#fff",marginBottom:20}},
          e("div", {style:{fontSize:52}}, emoji),
          e("h1", {style:{margin:"4px 0",fontSize:24,fontWeight:800}}, msg),
          e("div", {style:{fontSize:44,fontWeight:800,margin:"4px 0"}}, pct+"%"),
          e("p", {style:{margin:0,opacity:0.9}}, r.correct+" / "+r.total+" correct")
        ),
        // Round by round
        e("h2", {style:{fontSize:16,fontWeight:700,color:T.txt,margin:"0 0 10px"}}, "📊 Round-by-Round"),
        r.sections.map(function(s,i){
          var sp = Math.round(s.correct/s.total*100);
          var perf = s.correct===s.total;
          var sc = perf?T.ok:sp>=50?T.warn:T.err;
          return e("div", {key:i,style:{background:T.card,borderRadius:10,padding:14,marginBottom:6,border:"1px solid "+T.bdr,borderLeft:"4px solid "+sc}},
            e("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("div", null,
                e("span", {style:{fontSize:13,fontWeight:600,color:T.txt}}, s.icon+" "+s.name),
                e("span", {style:{fontSize:11,color:T.txtL,marginLeft:6}}, s.correct+"/"+s.total)
              ),
              perf ? e("span", {style:{fontSize:10,color:T.ok,fontWeight:600}}, "⭐") :
                e("button", {onClick:function(){setRetestSec(s);setRetestAns({});setRetestDone(false);setScreen("retest");},
                  style:{padding:"3px 8px",borderRadius:6,border:"none",fontSize:10,background:T.priL,color:T.pri,cursor:"pointer",fontWeight:600}}, "Practice")
            ),
            e("div", {style:{height:5,background:"#F1F5F9",borderRadius:99,marginTop:6}},
              e("div", {style:{height:"100%",background:sc,borderRadius:99,width:sp+"%"}})
            )
          );
        }),
        // Mistakes review
        e("h2", {style:{fontSize:16,fontWeight:700,color:T.txt,margin:"20px 0 10px"}}, "📝 Review Mistakes"),
        r.sections.filter(function(s){return s.correct<s.total;}).map(function(s,si){
          return e("div", {key:si,style:{marginBottom:16}},
            e("h3", {style:{fontSize:14,fontWeight:700,color:T.ac3,margin:"0 0 6px"}}, s.icon+" "+s.name),
            e("div", {style:{background:T.warnL,borderRadius:8,padding:10,marginBottom:8,fontSize:12,color:"#92400E",lineHeight:"1.5"}}, "💡 "+s.teach),
            s.questions.filter(function(q){return !q.isCorrect;}).map(function(q,qi){
              return e("div", {key:qi,style:{background:T.card,borderRadius:8,padding:12,marginBottom:5,borderLeft:"3px solid "+T.err,border:"1px solid "+T.errL}},
                e("p", {style:{margin:0,fontSize:12,fontWeight:600,color:T.txt,whiteSpace:"pre-line"}}, q.q),
                e("div", {style:{marginTop:4,fontSize:11}},
                  q.userAnswer!==undefined ?
                    e("span", {style:{color:T.err,fontWeight:600}}, "You: "+"ABCD"[q.userAnswer]+" — "+q.options[q.userAnswer]) :
                    e("span", {style:{color:T.txtL}}, "Not answered")
                ),
                e("div", {style:{marginTop:3,fontSize:11,color:T.ok,fontWeight:600}}, "✓ "+"ABCD"[q.answer]+" — "+q.options[q.answer]),
                e("div", {style:{marginTop:6,padding:8,background:"#F0F9FF",borderRadius:6,fontSize:11,color:"#0369A1",lineHeight:"1.5"}}, "📖 "+q.explain)
              );
            })
          );
        }),
        // Action buttons
        e("div", {style:{display:"flex",gap:8,marginTop:20,marginBottom:32}},
          e("button", {onClick:function(){setScreen("home");},
            style:{flex:1,padding:12,borderRadius:12,border:"1px solid "+T.bdr,background:T.card,color:T.txt,cursor:"pointer",fontWeight:600,fontSize:14}}, "🏠 Home"),
          e("button", {onClick:startExam,
            style:{flex:1,padding:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,"+T.pri+","+T.ac3+")",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}, "🔄 New Exam")
        )
      )
    );
  }

  // ─── RETEST ───────────────────────────────────────────────────
  if (screen === "retest" && retestSec) {
    var wq = retestSec.questions.filter(function(q){return !q.isCorrect;});
    if (!wq.length) return e("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
      e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:56}},"⭐"),e("h2",null,"All correct!"),
        e("button",{onClick:function(){setScreen("results");},style:{padding:"12px 24px",borderRadius:12,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600}},"Back")));

    return e("div", {style:{minHeight:"100vh",background:T.bg}},
      e("div", {style:{maxWidth:600,margin:"0 auto",padding:"24px 16px"}},
        e("button", {onClick:function(){setScreen("results");},style:{background:"none",border:"none",color:T.txtL,cursor:"pointer",fontSize:14,marginBottom:12}}, "← Results"),
        e("div", {style:{background:"linear-gradient(135deg,"+T.ac1+","+T.ac3+")",borderRadius:16,padding:18,color:"#fff",marginBottom:16,textAlign:"center"}},
          e("h2", {style:{margin:0,fontSize:18,fontWeight:700}}, "🎯 "+retestSec.icon+" "+retestSec.name)
        ),
        e("div", {style:{background:T.warnL,borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:"#92400E",lineHeight:"1.5"}}, "💡 "+retestSec.teach),
        wq.map(function(q,i){
          var ua=retestAns[i],sh=retestDone,ok=sh&&ua===q.answer;
          return e("div", {key:i,style:{background:T.card,borderRadius:12,padding:16,marginBottom:10,
            border:"1px solid "+(sh?(ok?T.ok:T.errL):T.bdr),borderLeft:sh?"4px solid "+(ok?T.ok:T.err):"4px solid "+T.pri}},
            e("p", {style:{fontSize:13,fontWeight:600,color:T.txt,lineHeight:"1.5",margin:"0 0 10px",whiteSpace:"pre-line"}}, q.q),
            e("div", {style:{display:"flex",flexDirection:"column",gap:6}},
              q.options.map(function(opt,oi){
                var sel=ua===oi,cor=oi===q.answer;
                var bg=T.card,bc=T.bdr;
                if(sh&&cor){bg=T.okL;bc=T.ok;}if(sh&&sel&&!cor){bg=T.errL;bc=T.err;}if(!sh&&sel){bg=T.priL;bc=T.pri;}
                return e("button", {key:oi,onClick:function(){if(!retestDone){var n=Object.assign({},retestAns);n[i]=oi;setRetestAns(n);}},
                  style:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"2px solid "+bc,background:bg,cursor:retestDone?"default":"pointer",textAlign:"left"}},
                  e("span", {style:{width:24,height:24,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
                    background:(sel&&!sh)?T.pri:(sh&&cor)?T.ok:"#F1F5F9",color:((sel&&!sh)||(sh&&cor))?"#fff":T.txtL}}, "ABCD"[oi]),
                  e("span", {style:{fontSize:13,color:T.txt}}, opt)
                );
              })
            ),
            sh && e("div", {style:{marginTop:10,padding:10,background:"#F0F9FF",borderRadius:8,fontSize:12,color:"#0369A1",lineHeight:"1.5"}}, "📖 "+q.explain)
          );
        }),
        !retestDone ?
          e("button", {onClick:function(){setRetestDone(true);},
            style:{width:"100%",padding:12,borderRadius:12,border:"none",marginTop:8,background:"linear-gradient(135deg,"+T.ok+",#16A34A)",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}, "✓ Check Answers") :
          e("div", {style:{display:"flex",gap:8,marginTop:12,justifyContent:"center"}},
            e("button", {onClick:function(){setRetestAns({});setRetestDone(false);},
              style:{padding:"8px 16px",borderRadius:10,border:"1px solid "+T.bdr,background:T.card,color:T.txt,cursor:"pointer",fontWeight:600,fontSize:12}}, "🔄 Retry"),
            e("button", {onClick:function(){setScreen("results");},
              style:{padding:"8px 16px",borderRadius:10,border:"none",background:T.pri,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:12}}, "📊 Results")
          )
      )
    );
  }

  return null;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
